<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>物書き帖</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#F7F4ED">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --paper:#F7F4ED;
  --sheet:#FFFDF8;
  --ink:#2B2A28;
  --ink-soft:#6E685E;
  --ai:#234A7C;
  --ai-weak:#E8EEF6;
  --shu:#B5402B;
  --line:#E5DFD2;
  --serif:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  --sans:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}

/* ===== テーマ（背景色） ===== */
body[data-theme="dark"]{
  --paper:#1A1A1C; --sheet:#242427; --ink:#E8E5DE; --ink-soft:#9A958B;
  --ai:#8FB4E8; --ai-weak:#2A3340; --shu:#E08B76; --line:#36363A;
}
body[data-theme="sepia"]{
  --paper:#EFE6D3; --sheet:#F7EFDD; --ink:#3A3026; --ink-soft:#7A6F5C;
  --ai:#1F5A8C; --ai-weak:#E2E9F0; --shu:#B5402B; --line:#DDD2BB;
}
body[data-theme="mint"]{
  --paper:#E7F0EC; --sheet:#F4FAF7; --ink:#23332C; --ink-soft:#5F7068;
  --ai:#1F6F5C; --ai-weak:#DCEFE8; --shu:#B5402B; --line:#D2E2DA;
}
body[data-theme="night"]{
  --paper:#0E1726; --sheet:#16223A; --ink:#DCE6F5; --ink-soft:#8896AE;
  --ai:#7FA8E0; --ai-weak:#1E2C46; --shu:#E08B76; --line:#27344F;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6}
#app{max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}

/* ---- 秘モード：入力欄を■で隠す ---- */
body.secret .ed-rich,
body.secret .ed-body,
body.secret .ed-title,
body.secret textarea,
body.secret input[type=text]{
  -webkit-text-security:square;
}

/* ---- ヘッダー ---- */
.hdr{
  position:sticky;top:0;z-index:10;background:var(--paper);
  display:flex;align-items:center;gap:8px;
  padding:calc(env(safe-area-inset-top) + 12px) 14px 10px;
  border-bottom:1px solid var(--line);
}
.hdr h1{font-family:var(--serif);font-size:18px;font-weight:600;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .sub{font-size:13px;color:var(--ink-soft);font-weight:400}
.iconbtn{
  border:1px solid var(--line);background:var(--sheet);color:var(--ink);
  border-radius:8px;padding:7px 12px;font-size:13px;font-family:var(--sans);
  cursor:pointer;flex-shrink:0;
}
.iconbtn.primary{background:var(--ai);border-color:var(--ai);color:#fff}
.iconbtn.danger{color:var(--shu);border-color:#E5C7BF}
.secretbtn{
  border:1px solid var(--line);background:var(--sheet);color:var(--ink-soft);
  border-radius:8px;padding:7px 12px;font-size:13px;font-family:var(--serif);
  cursor:pointer;flex-shrink:0;
}
.secretbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ---- 本体 ---- */
.main{flex:1;padding:14px 14px calc(env(safe-area-inset-bottom) + 84px)}
.main.editor-main{padding-bottom:calc(env(safe-area-inset-bottom) + 14px)}

/* ---- カード ---- */
.card{
  background:var(--sheet);border:1px solid var(--line);border-radius:10px;
  padding:13px 14px;margin-bottom:10px;cursor:pointer;
}
.card:active{background:#FBF7EE}
.card .t{font-family:var(--serif);font-size:16px;font-weight:600;word-break:break-all}
.card .m{font-size:12px;color:var(--ink-soft);margin-top:3px}
.card .preview{font-size:13px;color:var(--ink-soft);margin-top:6px;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .total{font-family:var(--serif);font-size:13px;color:var(--ai);margin-top:4px}

.charcard{display:flex;gap:12px;align-items:flex-start}
.charcard .face{
  width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;
  border:1px solid var(--line);background:#EFEAE0;
}
.face-ph{
  width:56px;height:56px;border-radius:8px;flex-shrink:0;border:1px solid var(--line);
  background:#EFEAE0;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:18px;
}
.face-secret{
  width:56px;height:56px;border-radius:8px;flex-shrink:0;border:1px solid var(--line);
  background:#D8D2C4;color:#8A8273;display:flex;align-items:center;justify-content:center;
  font-size:20px;
}

.empty{text-align:center;color:var(--ink-soft);padding:48px 20px;font-size:14px}
.empty .big{font-family:var(--serif);font-size:17px;margin-bottom:8px;color:var(--ink)}

/* ---- 画像グリッド ---- */
.imggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.imgcell{background:var(--sheet);border:1px solid var(--line);border-radius:10px;
  overflow:hidden;cursor:pointer}
.imgcell img{width:100%;height:120px;object-fit:cover;display:block;background:#EFEAE0}
.imgcell .cap{font-size:12px;padding:6px 9px;color:var(--ink);word-break:break-all;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imgcell .secretbox{width:100%;height:120px;background:#D8D2C4;color:#8A8273;
  display:flex;align-items:center;justify-content:center;font-size:26px}

/* ---- 下タブ ---- */
.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:var(--sheet);border-top:1px solid var(--line);
  display:flex;max-width:680px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom);
}
.tabs button{
  flex:1;border:none;background:none;padding:10px 0 9px;cursor:pointer;
  font-family:var(--sans);font-size:11px;color:var(--ink-soft);
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tabs button .g{font-family:var(--serif);font-size:17px;line-height:1}
.tabs button.on{color:var(--ai);font-weight:600}
.tabs button.on .g{border-bottom:2px solid var(--ai)}

/* ---- 入力 ---- */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px}
input[type=text],textarea,select{
  width:100%;border:1px solid var(--line);border-radius:8px;background:var(--sheet);
  padding:9px 11px;font-size:15px;color:var(--ink);font-family:var(--sans);
}
textarea{resize:vertical;min-height:90px;line-height:1.7}
input:focus,textarea:focus{outline:2px solid var(--ai);outline-offset:-1px}

/* ---- 執筆エディタ ---- */
.ed-title{
  font-family:var(--serif);font-size:17px;font-weight:600;border:none;background:none;
  width:100%;padding:4px 2px;border-bottom:1px dashed var(--line);
}
.ed-title:focus{outline:none;border-bottom-color:var(--ai)}
.ed-body{
  font-family:var(--serif);font-size:16px;line-height:2.0;letter-spacing:.02em;
  border:none;background:none;width:100%;min-height:60vh;padding:12px 2px;resize:none;
}
.ed-body:focus{outline:none}
/* リッチ本文：contenteditable */
.ed-rich{
  font-family:var(--serif);font-size:16px;line-height:2.0;letter-spacing:.02em;
  width:100%;min-height:60vh;padding:12px 2px;outline:none;white-space:pre-wrap;
  word-break:break-word;-webkit-user-modify:read-write;
}
.ed-rich:empty:before{content:attr(data-ph);color:var(--ink-soft)}
.ed-rich u{text-decoration-thickness:1px;text-underline-offset:3px}
.ed-rich s{text-decoration-line:line-through}
/* 傍点：圏点（縦横どちらでも文字の脇に点） */
.ed-rich em.bouten, .tate-body em.bouten{
  font-style:normal;
  -webkit-text-emphasis:filled dot; text-emphasis:filled dot;
  -webkit-text-emphasis-position:over right; text-emphasis-position:over right;
}
/* 装飾ツールバー */
.ed-tools{
  position:sticky;top:calc(env(safe-area-inset-top) + 56px);z-index:8;
  display:none;gap:6px;background:var(--paper);padding:8px 0 6px;
  border-bottom:1px solid var(--line);flex-wrap:wrap;
}
.ed-tools.show{display:flex}
.iconbtn.toolon{background:var(--ai);border-color:var(--ai);color:#fff}
.ed-tools button{
  border:1px solid var(--line);background:var(--sheet);color:var(--ink);
  border-radius:7px;padding:6px 12px;font-size:14px;font-family:var(--serif);cursor:pointer;
}
.ed-tools button:active{background:var(--ai-weak)}
.ed-tools .lbl{font-size:11px;color:var(--ink-soft);align-self:center;margin-right:2px}
.counter{
  position:sticky;bottom:0;background:var(--paper);
  border-top:1px solid var(--line);padding:8px 2px calc(env(safe-area-inset-bottom) + 8px);
  font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center;
}
.counter .maisu{font-family:var(--serif);color:var(--ink);font-size:13px}
.counter .maisu b{font-size:16px;color:var(--ai)}
.savemark{font-size:11px;color:var(--ink-soft)}

/* ---- 縦書きプレビュー ---- */
.tate-wrap{position:fixed;inset:0;z-index:50;background:var(--sheet);display:flex;flex-direction:column}
.tate-bar{display:flex;justify-content:space-between;align-items:center;
  padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;border-bottom:1px solid var(--line)}
.tate-bar .t{font-family:var(--serif);font-weight:600}
.tate-body{
  flex:1;overflow-x:auto;overflow-y:hidden;padding:18px 16px;
  writing-mode:vertical-rl;font-family:var(--serif);font-size:17px;line-height:2.1;
  letter-spacing:.04em;white-space:pre-wrap;
}

/* ---- モーダル ---- */
.modal-bg{position:fixed;inset:0;background:rgba(43,42,40,.35);z-index:40;
  display:flex;align-items:flex-end;justify-content:center}
.modal{
  background:var(--sheet);border-radius:14px 14px 0 0;width:100%;max-width:680px;
  padding:18px 16px calc(env(safe-area-inset-bottom) + 18px);
  max-height:88vh;overflow-y:auto;
}
.modal h2{font-family:var(--serif);font-size:16px;margin-bottom:14px}
.dlg-bg{position:fixed;inset:0;background:rgba(43,42,40,.45);z-index:60;
  display:flex;align-items:center;justify-content:center;padding:24px}
.dlg{background:var(--sheet);border:1px solid var(--line);border-radius:14px;
  width:100%;max-width:340px;padding:20px 18px 16px;box-shadow:0 8px 30px rgba(43,42,40,.25)}
.dlg p{font-size:14px;line-height:1.7;white-space:pre-wrap;margin-bottom:16px}
.dlg input{width:100%;margin-bottom:16px}
.dlg .btns{display:flex;gap:8px}
.dlg .btns .iconbtn{flex:1;padding:11px;text-align:center}
.modal .row{display:flex;gap:8px;margin-top:14px}
.modal .row .iconbtn{flex:1;padding:11px;text-align:center}
.modal .bigimg{width:100%;max-height:52vh;object-fit:contain;border-radius:8px;
  background:#EFEAE0;border:1px solid var(--line);margin-bottom:12px}
.modal .bigimg-secret{width:100%;height:200px;border-radius:8px;background:#D8D2C4;
  color:#8A8273;display:flex;align-items:center;justify-content:center;font-size:34px;
  border:1px solid var(--line);margin-bottom:12px}
.imgpick{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.imgpick .face,.imgpick .face-ph,.imgpick .face-secret{width:72px;height:72px}

.menu-item{
  display:block;width:100%;text-align:left;background:none;border:none;
  border-bottom:1px solid var(--line);padding:13px 4px;font-size:15px;
  font-family:var(--sans);color:var(--ink);cursor:pointer;
}
.menu-item.danger{color:var(--shu)}
.menu-item:last-child{border-bottom:none}
.note{font-size:12px;color:var(--ink-soft);margin-top:10px;line-height:1.7}
.picker-list{max-height:48vh;overflow-y:auto;border:1px solid var(--line);border-radius:8px}
.picker-row{display:flex;align-items:center;gap:10px;padding:11px 12px;
  border-bottom:1px solid var(--line);cursor:pointer}
.picker-row:last-child{border-bottom:none}
.picker-row input{width:18px;height:18px;flex-shrink:0;accent-color:var(--ai)}
.picker-row .num{font-family:var(--serif);color:var(--ai);font-size:13px;
  min-width:22px;text-align:center;flex-shrink:0}
.picker-row .ttl{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.picker-row .cnt{font-size:11px;color:var(--ink-soft);flex-shrink:0}

.fab{
  position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 72px);z-index:9;
  width:52px;height:52px;border-radius:50%;border:none;background:var(--ai);color:#fff;
  font-size:26px;line-height:1;cursor:pointer;box-shadow:0 3px 10px rgba(35,74,124,.35);
}
.fab.home{bottom:calc(env(safe-area-inset-bottom) + 20px)}
.badge{display:inline-block;font-size:11px;color:var(--ai);background:var(--ai-weak);
  border-radius:5px;padding:1px 7px;margin-right:6px;font-family:var(--sans)}
.totalbar{
  background:var(--sheet);border:1px solid var(--line);border-radius:10px;
  padding:10px 14px;margin-bottom:12px;font-family:var(--serif);font-size:13px;
}
.totalbar b{color:var(--ai);font-size:17px}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none">
<input type="file" id="imgFile" accept="image/*" style="display:none">
<input type="file" id="txtFile" accept=".txt,text/plain" style="display:none">

<script>
"use strict";
/* ============================================================
   保存層：IndexedDB（大容量）優先、使えへん環境では localStorage
   ============================================================ */
const LS_KEY = "monokakicho_v1";
const SECRET_KEY = "monokakicho_secret";
const MIGRATED_KEY = "monokakicho_migrated";
const DB_NAME = "monokakicho";
const STORE = "works";

let data = { works: [] };
let db = null;
let useIDB = false;

function migrate(d){
  (d.works||[]).forEach(w=>{
    if(!w.chapters) w.chapters = [];
    if(!w.images) w.images = [];
    if(!w.plots) w.plots = [];
    if(!w.chars) w.chars = [];
    if(!w.notes) w.notes = [];
  });
  return d;
}

/* ---- IndexedDB ラッパ ---- */
function openDB(){
  return new Promise(res=>{
    if(!window.indexedDB){ res(null); return; }
    let req;
    try{ req = indexedDB.open(DB_NAME, 1); }catch(e){ res(null); return; }
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, {keyPath:"id"});
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => res(null);
    req.onblocked = () => res(null);
  });
}
function idbAll(){
  return new Promise(res=>{
    try{
      const rq = db.transaction(STORE,"readonly").objectStore(STORE).getAll();
      rq.onsuccess = () => res(rq.result||[]);
      rq.onerror = () => res(null);
    }catch(e){ res(null); }
  });
}
function idbPut(w){
  return new Promise(res=>{
    try{
      const tx = db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).put(w);
      tx.oncomplete = () => res(true);
      tx.onerror = () => res(false);
      tx.onabort = () => res(false);
    }catch(e){ res(false); }
  });
}
function idbDel(id){
  return new Promise(res=>{
    try{
      const tx = db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => res(true);
      tx.onerror = () => res(false);
    }catch(e){ res(false); }
  });
}
function idbClear(){
  return new Promise(res=>{
    try{
      const tx = db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).clear();
      tx.oncomplete = () => res(true);
      tx.onerror = () => res(false);
    }catch(e){ res(false); }
  });
}

/* ---- localStorage 予備 ---- */
function loadLS(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw) return migrate(JSON.parse(raw)); }
  catch(e){}
  return { works: [] };
}
function saveLS(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(data)); markSaved(); }
  catch(e){
    if(e && (e.name==="QuotaExceededError" || e.code===22)){
      uiAlert("端末の保存容量がいっぱいです。画像を減らすか、JSONで控えを取ってから整理してください。");
      markSaved("※容量超過：保存できていません");
    } else markSaved("※この環境では端末保存不可（書き出し推奨）");
  }
}

/* ---- 保存の入口（呼ぶ側はこの3つだけ） ---- */
function persistWork(w){
  if(!w) return;
  if(useIDB){
    idbPut(w).then(ok => markSaved(ok ? null : "※保存に失敗しました（容量確認を）"));
  } else saveLS();
}
function removeWorkRecord(id){
  if(useIDB) idbDel(id);
  else saveLS();
}
async function persistAll(){
  if(useIDB){
    await idbClear();
    for(const w of data.works) await idbPut(w);
    markSaved();
  } else saveLS();
}

/* ---- 起動：IDBを開き、旧localStorageデータがあれば引っ越し ---- */
async function init(){
  db = await openDB();
  useIDB = !!db;
  if(useIDB){
    let works = await idbAll();
    if(works === null){ useIDB = false; }
    else {
      let migrated = false;
      try{ migrated = localStorage.getItem(MIGRATED_KEY)==="1"; }catch(e){}
      if(!works.length && !migrated){
        try{
          const raw = localStorage.getItem(LS_KEY);
          if(raw){
            const old = migrate(JSON.parse(raw));
            works = old.works || [];
            for(const w of works) await idbPut(w);
          }
        }catch(e){}
        try{ localStorage.setItem(MIGRATED_KEY,"1"); }catch(e){}
      }
      data = migrate({works});
      data.works.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
      try{
        if(navigator.storage && navigator.storage.persist) navigator.storage.persist();
      }catch(e){}
    }
  }
  if(!useIDB) data = loadLS();
  applySecret();
applyTheme();
  render();
}

/* ============ 秘モード ============ */
let secret = false;
try{ secret = localStorage.getItem(SECRET_KEY)==="1"; }catch(e){}
function applySecret(){ document.body.classList.toggle("secret", secret); }

/* ===== テーマ（背景色） ===== */
const THEME_KEY = "monokakicho_theme";
const THEMES = [
  {id:"light", name:"生成り（標準）"},
  {id:"dark",  name:"黒（ダーク）"},
  {id:"night", name:"紺（ナイト）"},
  {id:"sepia", name:"セピア"},
  {id:"mint",  name:"若葉"},
];
let tools = false;  // 装飾ツールバーの表示状態
try{ tools = localStorage.getItem("monokakicho_tools")==="1"; }catch(e){}
function toggleTools(){
  tools = !tools;
  try{ localStorage.setItem("monokakicho_tools", tools?"1":"0"); }catch(e){}
  const t = document.getElementById("edTools");
  const b = document.getElementById("toolBtn");
  if(t) t.classList.toggle("show", tools);
  if(b) b.classList.toggle("toolon", tools);
}
let theme = "light";
try{ theme = localStorage.getItem(THEME_KEY) || "light"; }catch(e){}
function applyTheme(){
  if(theme==="light") document.body.removeAttribute("data-theme");
  else document.body.setAttribute("data-theme", theme);
  const meta = document.querySelector('meta[name=theme-color]');
  if(meta){
    const bg = getComputedStyle(document.body).getPropertyValue('--paper').trim();
    if(bg) meta.setAttribute('content', bg);
  }
}
function setTheme(id){
  theme = id;
  try{ localStorage.setItem(THEME_KEY, id); }catch(e){}
  applyTheme(); closeModal(); render();
}
function openThemeMenu(){
  openModal(`
    <h2>背景の色を選ぶ</h2>
    ${THEMES.map(t=>`<button class="menu-item" onclick="setTheme('${t.id}')">
      ${t.name}${theme===t.id?'　✓':''}</button>`).join("")}
    <div class="note">黒・紺の暗い背景では、文字や見出しが自動で明るい色に切り替わって読みやすうなります。</div>
    <div class="row"><button class="iconbtn" onclick="closeModal()">閉じる</button></div>
  `);
}
function toggleSecret(){
  secret = !secret;
  try{ localStorage.setItem(SECRET_KEY, secret ? "1" : "0"); }catch(e){}
  applySecret(); render();
}
function mask(s, max){
  const t = s||"";
  if(!secret) return esc(t);
  const n = Math.min(t.replace(/\s/g,"").length, max||30);
  return "■".repeat(Math.max(n,1));
}
function secretBtn(){
  return `<button class="secretbtn ${secret?'on':''}" onclick="toggleSecret()" title="シークレットモード">秘</button>`;
}

/* ============ 共通 ============ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = s => (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtDate = ts => { const d = new Date(ts); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; };
function htmlToPlain(html){
  if(html==null) return "";
  // <br>と</div>/<p>を改行に、その他タグを除去、実体参照を戻す
  let t = String(html)
    .replace(/<div><br\s*\/?><\/div>/gi,"\n")
    .replace(/<br\s*\/?>/gi,"\n")
    .replace(/<\/(div|p)>/gi,"\n")
    .replace(/<[^>]+>/g,"");
  const ta = document.createElement("textarea"); ta.innerHTML = t;
  return ta.value;
}
function isHtmlBody(s){ return /<(br|div|p|u|s|em|span)[ >]/i.test(s||""); }
function bodyPlain(body){ return isHtmlBody(body) ? htmlToPlain(body) : (body||""); }
function countChars(s){ return bodyPlain(s).replace(/\s/g,"").length; }
function genkou(s){
  const n = bodyPlain(s).replace(/\s/g,"").length;
  return { mai: Math.floor(n/400), ji: n%400, n };
}
function fmtBytes(b){
  if(b == null) return "不明";
  if(b >= 1073741824) return (b/1073741824).toFixed(2)+" GB";
  if(b >= 1048576) return (b/1048576).toFixed(1)+" MB";
  return Math.round(b/1024)+" KB";
}
const $ = sel => document.querySelector(sel);

/* ============ 画面状態 ============ */
let view = { screen:"home", workId:null, tab:"write", itemId:null };
let saveTimer = null;
function go(v){ view = Object.assign({}, view, v); render(); }
function getWork(){ return data.works.find(w=>w.id===view.workId); }

function markSaved(msg){
  const el = $("#savemark");
  if(el){ el.textContent = msg || "保存しました"; setTimeout(()=>{ if($("#savemark")) $("#savemark").textContent=""; }, 1500); }
}
function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>persistWork(getWork()), 400);
}

/* ============ 画像取り込み（縮小・圧縮してから保存） ============ */
let imgCallback = null;
function pickImage(cb){
  imgCallback = cb;
  $("#imgFile").click();
}
$("#imgFile").addEventListener("change", function(){
  const f = this.files[0]; this.value = "";
  if(!f || !imgCallback) return;
  const r = new FileReader();
  r.onload = () => {
    const img = new Image();
    img.onload = () => {
      const MAX = useIDB ? 1280 : 720;   /* 大容量保存なら高めの画質で */
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        const k = MAX / Math.max(w,h);
        w = Math.round(w*k); h = Math.round(h*k);
      }
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,w,h);
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = cv.toDataURL("image/jpeg", useIDB ? 0.82 : 0.78);
      const cb = imgCallback; imgCallback = null;
      cb(dataUrl);
    };
    img.onerror = () => uiAlert("画像を読み込めませんでした。");
    img.src = r.result;
  };
  r.readAsDataURL(f);
});

function tabWrite(w){
  if(!w.chapters.length) return `<div class="empty"><div class="big">まだ一話もおへん</div>「＋」で第一話を書き始めとくれやす。</div>`;

      <div class="preview">${mask(bodyPlain(c.body).slice(0,80), 40)}</div>
    </div>`;
  }).join("");

function tabCards(w, key, emptyT, emptyM){
  if(!w[key].length) return `<div class="empty"><div class="big">${emptyT}</div>${emptyM}</div>`;
  return w[key].map(p=>`<div class="card" onclick="editCard('${key}','${p.id}')">

      <div class="preview">${mask((p.body||"").slice(0,100), 50)}</div>
    </div>`).join("");
}
function tabChars(w){
  if(!w.chars.length) return `<div class="empty"><div class="big">登場人物がおへん</div>「＋」で人物帖を作っとくれやす。</div>`;
  return w.chars.map(c=>{
    let face;
    if(c.img && secret) face = `<div class="face-secret">秘</div>`;
    else if(c.img) face = `<img class="face" src="${c.img}" alt="">`;
    else face = `<div class="face-ph">人</div>`;
    return `<div class="card charcard" onclick="editChar('${c.id}')">
      ${face}
      <div style="flex:1;min-width:0">
        <div class="t">${mask(c.name, 10) || "名無し"}</div>
        <div class="m">${mask(c.role, 8)}${c.age?` ・ ${mask(c.age,6)}`:""}</div>
        <div class="preview">${mask((c.traits||"").slice(0,100), 40)}</div>
      </div>

}
function tabImages(w){
  if(!(w.images||[]).length) return `<div class="empty"><div class="big">画像がおへん</div>「＋」でスマホの写真や資料画像を追加できますえ。</div>`;
  return `<div class="imggrid">` + w.images.map(p=>{
    const pic = secret
      ? `<div class="secretbox">秘</div>`
      : `<img src="${p.img}" alt="" loading="lazy">`;
    return `<div class="imgcell" onclick="viewImage('${p.id}')">
      ${pic}<div class="cap">${mask(p.title, 10) || "無題の画像"}</div>

/* ---- 追加 ---- */
function addItem(){
  const w = getWork(); if(!w) return;
  if(view.tab==="write"){
    const c = { id:uid(), title:`第${w.chapters.length+1}話`, body:"", updatedAt:Date.now() };
    w.chapters.push(c); w.updatedAt = Date.now(); persistWork(w);
    go({screen:"editor", itemId:c.id});
  } else if(view.tab==="plot"){
    openModal(`
      <h2>プロットを追加</h2>
      <button class="menu-item" onclick="addPlot('blank')">白紙のメモを追加</button>
      <button class="menu-item" onclick="addPlot('kishotenketsu')">テンプレで追加（テーマ・あらすじ・起承転結）</button>
      <div class="row"><button class="iconbtn" onclick="closeModal()">やめとく</button></div>
    `);
  } else if(view.tab==="chars"){
    editChar(null);
  } else if(view.tab==="images"){
    pickImage(dataUrl=>{
      const w2 = getWork(); if(!w2) return;
      w2.images.push({id:uid(), title:"", img:dataUrl});
      w2.updatedAt = Date.now(); persistWork(w2); render();
      viewImage(w2.images[w2.images.length-1].id);
    });
  } else {
    editCard("notes", null);
  }
}
function addPlot(kind){
  const w = getWork(); closeModal();
  if(kind==="blank"){ editCard("plots", null); return; }
  const tpl = ["作品テーマ","あらすじ","起：物語の始まり","承：展開","転：転換点","結：結末"];
  tpl.forEach(t=> w.plots.push({id:uid(), title:t, body:""}));
  w.updatedAt = Date.now(); persistWork(w); render();
}

function plainToHtml(t){
  return esc(t).replace(/\n/g,"<br>");
}
/* 選択範囲に装飾を適用 */
function fmt(kind){
  const ed = $("#ed_body"); if(!ed) return;
  ed.focus();
  if(kind==="underline"){ document.execCommand("underline"); }
  else if(kind==="strike"){ document.execCommand("strikeThrough"); }
  else if(kind==="bouten"){ toggleBouten(); }
  else if(kind==="clear"){
    document.execCommand("removeFormat");
    // 傍点も外す
    unwrapBouten();
  }
  // 反映を保存
  const ev = new Event("input"); ed.dispatchEvent(ev);
}
function toggleBouten(){
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0 || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  // すでに傍点内なら外す、そうでなければ包む
  let node = sel.anchorNode;
  let inside = null;
  while(node && node!==$("#ed_body")){
    if(node.nodeType===1 && node.classList && node.classList.contains("bouten")){ inside=node; break; }
    node = node.parentNode;
  }
  if(inside){
    const parent = inside.parentNode;
    while(inside.firstChild) parent.insertBefore(inside.firstChild, inside);
    parent.removeChild(inside);
    return;
  }
  const em = document.createElement("em");
  em.className = "bouten";
  try{ em.appendChild(range.extractContents()); range.insertNode(em); }
  catch(e){}
  sel.removeAllRanges();
}
function unwrapBouten(){
  const ed = $("#ed_body"); if(!ed) return;
  ed.querySelectorAll("em.bouten").forEach(em=>{
    const p = em.parentNode;
    while(em.firstChild) p.insertBefore(em.firstChild, em);
    p.removeChild(em);
  });
}
function updateCount(body){
  const g = genkou(body);
  $("#ed_count").innerHTML = `${g.n.toLocaleString()}字　原稿用紙 <b>${g.mai}</b>枚と<b>${g.ji}</b>字`;
}
async function deleteChapter(){
  if(!await uiConfirm("この話をほんまに削除してよろしおすか？","削除する")) return;
  const w = getWork();
  w.chapters = w.chapters.filter(x=>x.id!==view.itemId);
  w.updatedAt = Date.now(); persistWork(w);
  go({screen:"work"});
}
function openTate(){
  const w = getWork(); const c = w.chapters.find(x=>x.id===view.itemId);
  const rich = isHtmlBody(c.body) ? c.body : plainToHtml(c.body||"");
  let bodyHtml;
  if(secret){
    // 装飾は保ったまま文字だけ■に（タグの外側の文字を置換）
    bodyHtml = rich.replace(/>([^<]+)</g, (m,txt)=>">"+txt.replace(/[^\s]/g,"■")+"<")
                   .replace(/^([^<]+)/, (m,txt)=>txt.replace(/[^\s]/g,"■"));
  } else {
    bodyHtml = rich;
  }
  const div = document.createElement("div");
  div.className = "tate-wrap"; div.id = "tate";
  div.innerHTML = `
    <div class="tate-bar">
      <span class="t">${mask(c.title, 12) || "無題"}</span>
      <button class="iconbtn" onclick="document.getElementById('tate').remove()">閉じる</button>
    </div>
    <div class="tate-body">${bodyHtml||"（本文がおへん）"}</div>
  `;
  document.body.appendChild(div);
}

    <button class="menu-item" onclick="openThemeMenu()">背景の色を変える</button>
    <button class="menu-item danger" onclick="deleteWork()">この作品を削除</button>
    <div class="row"><button class="iconbtn" onclick="closeModal()">閉じる</button></div>
  `);
}
async function renameWork(){
  const w = getWork();
  const t = await uiPrompt("新しいタイトルは？", w.title);
  if(t===null) return;
  w.title = t.trim()||w.title; w.updatedAt = Date.now();
  persistWork(w); closeModal(); render();
}
async function deleteWork(){
  const w = getWork();
  if(!await uiConfirm(`「${w.title}」を本文ごとすべて削除します。ほんまによろしおすか？`,"削除する")) return;
  data.works = data.works.filter(x=>x.id!==w.id);
  removeWorkRecord(w.id); closeModal(); go({screen:"home"});
}
function buildTxt(w, chapters){
  return `${w.title}\n\n` + chapters.map(c=>`【${c.title}】\n\n${bodyPlain(c.body)}`).join("\n\n\n");
}
function exportTxt(){
  const w = getWork();
  download(`${w.title}.txt`, buildTxt(w, w.chapters), "text/plain");
  closeModal();
}
/* ---- 話数を選んで書き出し ---- */
function openExportPicker(){
  const w = getWork();
  if(!w.chapters.length){ uiAlert("書き出せる話がおへん。"); return; }
  const rows = w.chapters.map((c,i)=>`
    <label class="picker-row">
      <input type="checkbox" class="exp-chk" value="${c.id}" checked>
      <span class="num">${i+1}</span>
      <span class="ttl">${mask(c.title, 16) || "無題"}</span>
      <span class="cnt">${countChars(c.body).toLocaleString()}字</span>
    </label>`).join("");
  openModal(`
    <h2>話数を選んで書き出し</h2>
    <div class="row" style="margin-top:0;margin-bottom:10px">
      <button class="iconbtn" onclick="expSelectAll(true)">全部選ぶ</button>
      <button class="iconbtn" onclick="expSelectAll(false)">全部外す</button>
    </div>
    <div class="picker-list">${rows}</div>
    <div class="row">
      <button class="iconbtn" onclick="closeModal()">やめとく</button>
      <button class="iconbtn primary" onclick="doExportSelected()">選んだ話を書き出す</button>
    </div>
  `);
}
function expSelectAll(v){
  document.querySelectorAll(".exp-chk").forEach(c=>c.checked=v);
}
function doExportSelected(){
  const w = getWork();
  const ids = Array.from(document.querySelectorAll(".exp-chk"))
    .filter(c=>c.checked).map(c=>c.value);
  if(!ids.length){ uiAlert("一話も選ばれてしまへん。"); return; }
  const chapters = w.chapters.filter(c=>ids.includes(c.id));
  // ファイル名：1話だけならその話名、複数なら作品名＋話数
  let name;
  if(chapters.length === 1){
    name = `${w.title}_${chapters[0].title}.txt`;
  } else {
    const nums = chapters.map(c=>w.chapters.indexOf(c)+1);
    name = `${w.title}_第${nums[0]}〜${nums[nums.length-1]}話.txt`;
  }
  download(name.replace(/[\\/:*?"<>|]/g,"-"), buildTxt(w, chapters), "text/plain");
  closeModal();
}

/* ---- 控え（バックアップ） ---- */
function openBackupMenu(){
  openModal(`
    <h2>控え（バックアップ）</h2>
    <button class="menu-item" onclick="exportJson()">全データをJSONで書き出す</button>
    <button class="menu-item" onclick="document.getElementById('importFile').click()">JSONから読み込む（復元）</button>
    <div class="note" id="quotaNote">
      保存方式：${useIDB ? "IndexedDB（大容量）" : "localStorage（目安5MB）"}<br>
      データはこの端末のブラウザにだけ保存されてます。ブラウザのデータ消去で消えるさかい、節目ごとにJSONの控えを取っとくのが安心どす。
    </div>
    <div class="row"><button class="iconbtn" onclick="closeModal()">閉じる</button></div>
  `);
  try{
    if(navigator.storage && navigator.storage.estimate){
      navigator.storage.estimate().then(e=>{
        const el = $("#quotaNote");
        if(el && e && e.quota){
          el.innerHTML += `<br>使用量：${fmtBytes(e.usage)} ／ 上限の目安：${fmtBytes(e.quota)}`;
        }
      });
    }
  }catch(e){}
}
function exportJson(){
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  download(`物書き帖_控え_${stamp}.json`, JSON.stringify(data), "application/json");
  closeModal();
}
$("#importFile").addEventListener("change", function(){
  const f = this.files[0]; if(!f) return;
  const r = new FileReader();
  const self = this;
  r.onload = async () => {
    try{
      const d = migrate(JSON.parse(r.result));
      if(!d || !Array.isArray(d.works)) throw new Error("形式が違います");
      if(!await uiConfirm(`読み込むと今のデータは置き換わります（作品${d.works.length}件）。よろしおすか？`,"読み込む")){ self.value=""; return; }
      data = d;
      await persistAll(); closeModal(); go({screen:"home"}); uiAlert("読み込みました。");
    }catch(e){ uiAlert("読み込めませんでした：JSONの形式をご確認ください。"); }
    self.value = "";
  };
  r.readAsText(f);
});
/* ---- TXT取り込み：1ファイル＝1話として追加 ---- */
$("#txtFile").addEventListener("change", function(){
  const f = this.files[0]; const self = this;
  if(!f){ return; }
  const w = getWork(); if(!w){ self.value=""; return; }
  const r = new FileReader();
  r.onload = async () => {
    let text = String(r.result||"");
    // 先頭BOMを除去
    text = text.replace(/^\uFEFF/, "");
    // ファイル名（拡張子抜き）を話タイトルの既定に
    const base = f.name.replace(/\.[^.]+$/, "");
    const title = (await uiPrompt("この話のタイトルは？", base)) ;
    if(title===null){ self.value=""; return; }
    const c = { id:uid(), title:title.trim()||base||`第${w.chapters.length+1}話`,
      body: plainToHtml(text), updatedAt:Date.now() };
    w.chapters.push(c); w.updatedAt = Date.now();
    persistWork(w); self.value="";
    go({screen:"editor", itemId:c.id});
  };
  r.onerror = () => { uiAlert("ファイルを読み込めませんでした。"); self.value=""; };
  r.readAsText(f, "UTF-8");
});
function download(name, content, type){
  // TXTはWindowsのメモ帳でも化けへんよう、頭にBOMを付ける
  const parts = (type === "text/plain")
    ? [new Uint8Array([0xEF,0xBB,0xBF]), content]
    : [content];
  const blob = new Blob(parts, {type:type+";charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}

/* ---- モーダル ---- */
function openModal(html){
  closeModal();
  const bg = document.createElement("div");
  bg.className = "modal-bg"; bg.id = "modalbg";
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.addEventListener("click", e => { if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
}
function closeModal(){ const m = $("#modalbg"); if(m) m.remove(); }

/* ---- 自前ダイアログ（PWAでconfirm/alert/promptが効かへん対策） ---- */
function uiAlert(msg){
  return new Promise(resolve=>{
    const bg = document.createElement("div");
    bg.className = "dlg-bg";
    bg.innerHTML = `<div class="dlg"><p>${esc(msg)}</p>
      <div class="btns"><button class="iconbtn primary" id="dlgOk">わかった</button></div></div>`;
    document.body.appendChild(bg);
    bg.querySelector("#dlgOk").onclick = ()=>{ bg.remove(); resolve(); };
  });
}
function uiConfirm(msg, okLabel){
  return new Promise(resolve=>{
    const bg = document.createElement("div");
    bg.className = "dlg-bg";
    bg.innerHTML = `<div class="dlg"><p>${esc(msg)}</p>
      <div class="btns">
        <button class="iconbtn" id="dlgNo">やめとく</button>
        <button class="iconbtn danger" id="dlgYes">${esc(okLabel||"はい")}</button>
      </div></div>`;
    document.body.appendChild(bg);
    bg.querySelector("#dlgNo").onclick = ()=>{ bg.remove(); resolve(false); };
    bg.querySelector("#dlgYes").onclick = ()=>{ bg.remove(); resolve(true); };
  });
}
function uiPrompt(msg, def){
  return new Promise(resolve=>{
    const bg = document.createElement("div");
    bg.className = "dlg-bg";
    bg.innerHTML = `<div class="dlg"><p>${esc(msg)}</p>
      <input type="text" id="dlgInput" value="${esc(def||"")}">
      <div class="btns">
        <button class="iconbtn" id="dlgNo">やめとく</button>
        <button class="iconbtn primary" id="dlgYes">決定</button>
      </div></div>`;
    document.body.appendChild(bg);
    const inp = bg.querySelector("#dlgInput");
    inp.focus(); inp.select();
    const ok = ()=>{ const v = inp.value; bg.remove(); resolve(v); };
    bg.querySelector("#dlgYes").onclick = ok;
    bg.querySelector("#dlgNo").onclick = ()=>{ bg.remove(); resolve(null); };
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") ok(); });
  });
}


/* ---- PWA：オフライン用サービスワーカー登録（https時のみ） ---- */
try{
  if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost')){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}catch(e){}

init();
